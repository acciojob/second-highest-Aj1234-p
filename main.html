<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>	
	<script>
		function secondHighest(arr) {
		     let n = arr.length, firstMax = -Infinity;
			if(n==0)  return firstMax;
			for(let i=0;i<n;i++){
				 firstMax = Math.max(firstMax,arr[i]);
			}
			// console.log(firstMax);
			let secondMax = -Infinity;
			for(let i=0;i<n;i++){
				if(arr[i]<firstMax && arr[i]>secondMax){
					secondMax = arr[i];
				}
			}
			return secondMax;
		}

		function Main() {
			// var n = prompt("Enter the number of elements");
			var arr = [];
			for (var i = 0; i < n; i++) {
				arr[i] = prompt("Enter element " + (i+1))
			}
			alert(secondHighest(arr));
		}
		Main();
	</script>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
